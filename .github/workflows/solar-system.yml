name: Solar System Workflow

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - "feature/*" # matches feature/foo — NOT exploring-workflow

env:
    MONGO_URI: "mongodb+srv://supercluster.d83jj.mongodb.net/superData"
    MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
    MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
    unit-testing:
        name: Unit Testing
        strategy:
            matrix:
                nodejs_version: [18, 20]
                operating_system: [ubuntu-latest]
                exclude:
                    - nodejs_version: 18
                      operating_system: macos-latest
        runs-on: $ {{ matrix.operating_system }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js - ${{ matrix.nodejs_version }}
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.nodejs_version }}
                  check-latest: true # always fetch latest ${{ matrix.nodejs_version }}.x.x patch

            - name: Cache NPM dependencies
              uses: actions/cache@v3
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

            - name: Install Dependencies
              run: npm install

            - name: Run Unit Tests
              id: nodejs-unit-testing-step
              run: npm test

            - name: Archive Test Results
              if: always() # ensures this step runs even if the previous step fails
              uses: actions/upload-artifact@v7
              with:
                  name: Mocha-Test-Result
                  path: test-results.xml

    code-coverage:
        name: Code Coverage
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js 18
              uses: actions/setup-node@v3
              with:
                  node-version: 18

            - name: Cache NPM dependencies
              uses: actions/cache@v3
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

                  #testing cache
            - name: Install dependencies
              run: npm install

            - name: Run coverage
              continue-on-error: true
              run: npm run coverage

            - name: Archive coverage report
              uses: actions/upload-artifact@v7
              with:
                  name: Code-Coverage-Result
                  path: coverage
                  retention-days: 5
    docker:
        name: Containerization
        # needs: [unit-testing, code-coverage] # Disabling this for now to allow testing of the workflow without having to wait for the unit-testing and code-coverage jobs to complete.
        runs-on: ubuntu-latest
        permissions:
            packages: write # Grant write access to GHCR
            contents: read

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ vars.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_PASSWORD }}

            - name: Login to GHCR
              uses: docker/login-action@v2
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build Docker Image for Testing
              uses: docker/build-push-action@v5
              with:
                  context: . # points to local Dockerfile in the root directory.
                  load: true
                  push: false
                  tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

            - name: Run Container and Test `/live` Endpoint
              run: |
                  docker run --rm --name solar-system-app -d \
                      -p 3000:3000 \
                      -e MONGO_URI=$MONGO_URI \
                      -e MONGO_USERNAME=$MONGO_USERNAME \
                      -e MONGO_PASSWORD=$MONGO_PASSWORD \
                      geast1363/solar-system:${{ github.sha }}
                  sleep 5
                  echo "Verifying /live endpoint"
                  wget -q -O - http://127.0.0.1:3000/live | grep live

            - name: Docker Build and Push
              uses: docker/build-push-action@v4
              with:
                  context: .
                  push: true
                  tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

            - name: Push to Docker Hub & GHCR
              uses: docker/build-push-action@v4
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
                      ghcr.io/${{ github.repository_owner }}/solar-system:${{ github.sha }}
