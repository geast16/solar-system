name: Solar System Workflow

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - "feature/*"

env:
    MONGO_URI: "mongodb+srv://supercluster.d83jj.mongodb.net/superData"
    MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
    MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
    unit-testing:
        name: Unit Testing
        services:
            mongo-db:
                image: geast1363/mongo-db:non-prod
                ports:
                    - 27017:27017
        env:
            MONGO_URI: "mongodb://localhost:27017/superData"
            MONGO_USERNAME: non-prod-user
            MONGO_PASSWORD: non-prod-password
        strategy:
            matrix:
                nodejs_version: [18, 20]
                operating_system: [ubuntu-latest]
        runs-on: ${{ matrix.operating_system }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js - ${{ matrix.nodejs_version }}
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.nodejs_version }}
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Run Unit Tests
              id: nodejs-unit-testing-step
              run: npm test

            - name: Archive Test Results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: Mocha-Test-Result-${{ matrix.nodejs_version }}
                  path: test-results.xml

    code-coverage:
        name: Code Coverage
        container:
            image: node:18
        runs-on: ubuntu-latest
        services:
            mongo:
                image: geast1363/mongo-db:non-prod
                options: --name mongo
                ports:
                    - 27017:27017
        env:
            MONGO_URI: "mongodb://mongo:27017/superData"
            MONGO_USERNAME: non-prod-user
            MONGO_PASSWORD: non-prod-password
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Install Dependencies
              run: npm ci

            - name: Run Coverage
              continue-on-error: true
              run: npm run coverage

            - name: Archive Coverage Report
              uses: actions/upload-artifact@v4
              with:
                  name: Code-Coverage-Result
                  path: coverage
                  retention-days: 5

    reports-s3:
        name: AWS S3 - Upload Reports
        needs: [unit-testing, code-coverage]
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Download Mocha Test Artifact
              uses: actions/download-artifact@v3
              with:
                  name: Mocha-Test-Result

            - name: Download Code Coverage Artifact
              uses: actions/download-artifact@v3
              with:
                  name: Code-Coverage-Result

            - name: Merge Test Files
              run: |
                  echo "Listing workspace contents..."
                  ls -ltr
                  echo "Creating reports directory..."
                  mkdir reports-${{ github.sha }}
                  mv cobertura-coverage.xml reports-${{ github.sha }}/
                  mv test-results.xml       reports-${{ github.sha }}/
                  echo "Final contents:"
                  ls -ltr reports-${{ github.sha }}/

            - name:
                  Upload to AWS S3
                  # TODO: Replace with official AWS S3 upload action or AWS CLI
              run: echo "Uploading reports to S3..."

    docker:
        name: Containerization
        needs: [unit-testing, code-coverage]
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ vars.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_PASSWORD }}

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build Docker Image for Testing
              uses: docker/build-push-action@v5
              with:
                  context: .
                  load: true
                  push: false
                  tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

            - name: Run Container and Test /live Endpoint
              run: |
                  docker run --rm --name solar-system-app -d \
                      -p 3000:3000 \
                      -e MONGO_URI=$MONGO_URI \
                      -e MONGO_USERNAME=$MONGO_USERNAME \
                      -e MONGO_PASSWORD=$MONGO_PASSWORD \
                      ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
                  sleep 5
                  echo "Verifying /live endpoint"
                  wget -q -O - http://127.0.0.1:3000/live | grep live

            - name: Push to Docker Hub and GHCR
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
                      ghcr.io/${{ github.repository_owner }}/solar-system:${{ github.sha }}

    dev-deploy:
        name: Dev Deploy
        if: contains(github.ref, 'feature/')
        needs: docker
        uses: ./.github/workflows/reuse-deployment.yml
        secrets:
            k8s-kubeconfig: ${{ secrets.KUBECONFIG }}
            mongodb-password: ${{ secrets.MONGO_PASSWORD }}
        with:
            mongodb-uri: ${{ vars.MONGO_URI }}
            kubectl-version: v1.27.0 # optional override
            k8s-manifest-dir: kubernetes/development
            environment: ${{ vars.ENVIRONMENT }}

    dev-integration-testing:
        name: Dev Integration Testing
        if: contains(github.ref, 'feature/')
        needs: dev-deploy
        runs-on: ubuntu-latest
        steps:
            - name: Test /live Endpoint
              env:
                  URL: ${{ needs.dev-deploy.outputs.application-url }}
              run: |
                  echo "Testing endpoint: https://$URL/live"
                  curl https://$URL/live -s -k | jq -r .status | grep -iq live

    prod-deploy:
        name: Prod Deploy
        if: github.ref == 'refs/heads/main'
        needs: docker
        uses: ./.github/workflows/reuse-deployment.yml
        secrets:
            k8s-kubeconfig: ${{ secrets.KUBECONFIG }}
            mongodb-password: ${{ secrets.MONGO_PASSWORD }}
        with:
            mongodb-uri: ${{ vars.MONGO_URI }}
            kubectl-version: ${{ vars.KUBECTL_VERSION }}
            k8s-manifest-dir: kubernetes/production
            environment: ${{ vars.ENVIRONMENT }}

    prod-integration-testing:
        name: Prod Integration Testing
        if: github.ref == 'refs/heads/main'
        needs: prod-deploy
        runs-on: ubuntu-latest
        steps:
            - name: Test /live Endpoint
              env:
                  URL: ${{ needs.prod-deploy.outputs.application-url }}
              run: |
                  echo "Testing endpoint: https://$URL/live"
                  curl https://$URL/live -s -k | jq -r .status | grep -iq live
