name: Solar System Workflow

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - "feature/*" # matches feature/foo — NOT exploring-workflow

env:
    MONGO_URI: ${{ vars.MONGO_URI }}
    MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
    MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
    unit-testing:
        name: Unit Testing
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: 18
                  check-latest: true # always fetch latest 18.x.x patch

            - name: Install Dependencies
              run: npm install

            - name: Run Unit Tests
              run: npm test
