name: Deployment - Reusable Workflow

on:
    workflow_call:
        inputs:
            mongodb-uri:
                description: MongoDB connection string
                required: true
                type: string
            kubectl-version:
                description: kubectl CLI version
                required: false
                default: v1.26.0
                type: string
            k8s-manifest-dir:
                description: Path to Kubernetes manifests
                required: true
                default: kubernetes/
                type: string
            environment:
                description: Deployment environment name
                required: true
                default: dev
                type: string
        secrets:
            k8s-kubeconfig:
                required: true
            mongodb-password:
                required: true
        outputs:
            application-url:
                value: ${{ jobs.reuse-deploy.outputs.APP_INGRESS_URL }}
                description: URL of the deployed application

jobs:
    reuse-deploy:
        environment:
            name: ${{ inputs.environment }}
            url: https://${{ steps.set-ingress-host-address.outputs.APP_INGRESS_URL }}
        outputs:
            APP_INGRESS_URL: ${{ steps.set-ingress-host-address.outputs.APP_INGRESS_URL }}
        runs-on: ubuntu-latest
        env:
            USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Install kubectl CLI
              uses: azure/setup-kubectl@v3
              with:
                  version: ${{ inputs.kubectl-version }}

            - name: Install gke-gcloud-auth-plugin
              run: |
                  sudo apt-get update
                  sudo apt-get install -y apt-transport-https ca-certificates gnupg
                  curl https://packages.cloud.google.com/apt/doc/apt-key.gpg \
                      | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
                  echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] \
                      https://packages.cloud.google.com/apt cloud-sdk main" \
                      | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
                  sudo apt-get update
                  sudo apt-get install -y google-cloud-sdk-gke-gcloud-auth-plugin

            - name: Configure kubeconfig context
              run: |
                  mkdir -p $HOME/.kube
                  echo "${{ secrets.KUBECONFIG_CONTENT }}" > $HOME/.kube/config
                  echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

            - name: Fetch Kubernetes Cluster Details
              run: |
                  kubectl version
                  echo "------------------------------------------"
                  kubectl get nodes

            - name: Save Nginx Ingress IP
              id: save-nginx-ingress-ip
              run: |
                  INGRESS_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
                      -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
                  if [ -z "$INGRESS_IP" ]; then
                      echo "ERROR: Ingress IP is empty"
                      exit 1
                  fi
                  echo "INGRESS_IP=$INGRESS_IP" >> $GITHUB_ENV
                  echo "INGRESS_IP=$INGRESS_IP" >> $GITHUB_OUTPUT

            - name: Replace Tokens in Manifests
              uses: cschleiden/replace-tokens@v1
              with:
                  tokenPrefix: "_{_"
                  tokenSuffix: "_}_"
                  files: ${{ inputs.k8s-manifest-dir }}/*.yaml
              env:
                  NAMESPACE: ${{ vars.NAMESPACE }}
                  REPLICAS: ${{ vars.REPLICAS }}
                  IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
                  INGRESS_IP: ${{ env.INGRESS_IP }}

            - name: Create MongoDB Secret
              run: |
                  kubectl -n ${{ vars.NAMESPACE }} create secret generic mongo-db-creds \
                  --from-literal=MONGO_URI=${{ inputs.mongodb-uri}} \
                  --from-literal=MONGO_USERNAME=$MONGO_USERNAME \
                  --from-literal=MONGO_PASSWORD=${{ secrets.mongodb-password }} \
                  --save-config \
                  --dry-run=client \
                  -o yaml | kubectl apply -f -

            - name: Deploy to Development Environment
              run: |
                  kubectl apply -f ${{ inputs.k8s-manifest-dir }}
                  echo "Deployment complete."

            - name: Verify Development Deployment
              run: |
                  kubectl rollout status deployment/solar-system \
                      -n ${{ vars.NAMESPACE }} --timeout=120s
                  kubectl get pods -n ${{ vars.NAMESPACE }}
                  kubectl get ingress -n ${{ vars.NAMESPACE }}

            - name: Verify replaced manifests
              run: cat ${{ inputs.k8s-manifest-dir }}/*.yaml

            - name: Set App Ingress Host URL
              id: set-ingress-host-address
              run: |
                  HOST=$(kubectl -n ${{ vars.NAMESPACE }} \
                      get ingress -o jsonpath='{.items[0].spec.tls[0].hosts[0]}')
                  echo "APP_INGRESS_URL=$HOST" >> "$GITHUB_OUTPUT"
